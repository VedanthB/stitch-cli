<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px;
      background: #0a0f1a;
      font-family: 'IBM Plex Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .grid {
      position: absolute; inset: 0;
      background: linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .glow {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
      width: 600px; height: 400px;
      background: rgba(34,197,94,0.06); border-radius: 50%; filter: blur(80px);
    }
    .content { position: relative; text-align: center; }
    .icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 16px;
      background: rgba(34,197,94,0.1); border: 2px solid rgba(34,197,94,0.2);
      margin-bottom: 24px;
    }
    .icon svg { color: #22C55E; }
    h1 { font-size: 64px; font-weight: 700; color: #F8FAFC; line-height: 1.1; }
    h1 span { color: #22C55E; }
    .sub {
      margin-top: 16px; font-size: 22px; color: #94A3B8;
      font-family: 'JetBrains Mono', monospace;
    }
    .cmd {
      margin-top: 32px; display: inline-block;
      padding: 12px 24px; border-radius: 12px;
      background: rgba(30,41,59,0.8); border: 1px solid rgba(255,255,255,0.1);
      font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #F8FAFC;
    }
    .cmd .dollar { color: #22C55E; }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
      </svg>
    </div>
    <h1>AI UI design<br><span>from your terminal.</span></h1>
    <div class="sub">Zero-dependency Google Stitch CLI</div>
    <div class="cmd"><span class="dollar">$</span> npm install -g stitch-terminal</div>
  </div>
</body>
</html>
